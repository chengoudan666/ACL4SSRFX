[custom]
;不要随意改变关键字，否则会导致出错
;acl4SSR规则-在线版

;去广告：支持
;自动测速：支持
;微软分流：不支持
;苹果分流：不支持
;增强中国IP段：不支持
;增强国外GFW：不支持

; 【核心过滤】仅保留常用国家/地区及主流协议，其余全部丢弃（彻底防广告）
include_remarks=(?i)(香港|HK|台湾|TW|日本|JP|韩国|KR|新加坡|SG|美国|US|英国|UK|德国|DE|法国|FR|澳洲|AU|加拿大|CA|荷兰|NL|印度|IN|越南|VN|泰国|TH|菲律宾|PH|俄罗斯|RU|土耳其|TR|巴西|BR|阿根廷|AR|直连|DIRECT|relay|IEPL|IPLC|BGP|CN2|GIA|CMI|vless|vmess|trojan|ss|ssr|hysteria|hy2|tuic|snell|优选|CDN)

; 【核心修改】给通过筛选的正常节点加上✨狗蛋✨前缀
rename=^(.*)$@✨狗蛋✨$1

